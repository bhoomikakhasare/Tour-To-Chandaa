<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact-us</title>
    <link rel="stylesheet" href="contact.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
        integrity="sha384-QYIZto+st3yW+o8+5OHfT6S482Zsvz2WfOzpFSXMF9zqeLcFV0/wlZpMtyFcZALm" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>
    <div class="container">
        <header>
            <h1>Contact Us</h1><br>
            <p>We'd love to hear from you. Get in touch with us anytime.</p>
        </header>
        <br><br><br><br>
        <div class="content">

            <div class="content-forms">
                <section>
                    <i class="fa fa-map-marker fa-2x" aria-hidden="true"></i>
                    <h2>Address</h2>
                    <p>
                        Netaji chowk,<br>
                        Babupeth, ward no: 1<br>
                        Chandrapur
                    </p>
                </section>

                <section>
                    <i class="fa fa-phone fa-2x" aria-hidden="true"></i>
                    <h2>Phone</h2>
                    <p>+91 XXXXX XXXXX</p>
                </section>

                <section>
                    <i class="fa fa-envelope fa-2x" aria-hidden="true"></i>
                    <h2>E-mail</h2>
                    <p>tourtochanda@gmail.com</p>
                </section>
            </div>
        </div>

        <form>
            <div class="form">
                <div class="right">
                    <div class="contact-form">
                        <input type="text" required>
                        <span>Full name</span>
                    </div>

                    <div class="contact-form">
                        <input type="E-mail" required>
                        <span>E-mail Id</span>
                    </div>

                    <div class="contact-form">
                        <textarea name="text"></textarea>
                        <span>
                            Type your message....
                        </span>
                    </div>
                    <br>
                    <div class="contact-form">
                        <input type="submit" name="submit">
                    </div>
                </div>
            </div>

        </form>

        <ul class="media">
            <li><i class="fa-brands fa-facebook fa-2x"></i></li>
            <li><i class="fa-brands fa-instagram fa-2x"></i></li>
            <li><i class="fa-brands fa-whatsapp fa-2x"></i></li>
            <li><i class="fa-brands fa-twitter fa-2x"></i></li>
        </ul>
    <

        <div class="empty">
            
        </div>
    </div>
</body>

</html>
