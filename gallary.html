<script src="https://cdnjs.cloudflare.com/ajax/libs/lightbox2/2.11.4/js/lightbox.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap');

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    background:linear-gradient(
        135deg,
        #f8fafc,
        #eef2ff,
        #f1f5f9
    );

    min-height:100vh;
}

/* HERO TITLE */

.container{
    width:100%;
    padding:50px 6%;
}

.heading{
    text-align:center;
    margin-bottom:50px;
}

.heading h3{
    font-size:3rem;
    font-weight:700;
    color:#111827;
    margin-bottom:15px;
}

.heading span{
    color:#ff7b00;
}

.heading p{
    color:#64748b;
    font-size:1.1rem;
}

/* GALLERY */

.box{
    column-count:3;
    column-gap:20px;
}

/* IMAGE CARD */

.dream a{
    display:block;
    margin-bottom:20px;
    overflow:hidden;
    border-radius:18px;
    position:relative;
}

.dream img{
    width:100%;
    display:block;

    border-radius:18px;

    transition:0.5s ease;

    box-shadow:
    0 10px 25px rgba(0,0,0,.08);
}

/* HOVER EFFECT */

.dream a:hover img{
    transform:scale(1.08);
}

.dream a::before{
    content:"View";
    position:absolute;

    top:50%;
    left:50%;

    transform:
    translate(-50%,-50%);

    background:rgba(0,0,0,.7);

    color:white;

    padding:12px 25px;

    border-radius:30px;

    opacity:0;

    transition:.3s;

    z-index:10;
}

.dream a:hover::before{
    opacity:1;
}

/* GLASS EFFECT */

.dream a::after{
    content:"";
    position:absolute;
    inset:0;

    background:
    linear-gradient(
    transparent,
    rgba(0,0,0,.15));

    opacity:0;

    transition:.3s;
}

.dream a:hover::after{
    opacity:1;
}
.hero-banner{
    height:250px;

    background:
    linear-gradient(
    rgba(0,0,0,.45),
    rgba(0,0,0,.45)),
    url('homeimg.jpg');

    background-size:cover;
    background-position:center;

    display:flex;
    justify-content:center;
    align-items:center;

    color:white;
}

.hero-banner h1{
    font-size:4rem;
    font-weight:700;
    letter-spacing:2px;
}

.lb-nav a.lb-prev,
.lb-nav a.lb-next{
    opacity:1 !important;
}

.lb-nav a.lb-prev:hover,
.lb-nav a.lb-next:hover{
    opacity: 1 !important;
}

.lightbox .lb-image{
    width: 80vw !important;
    height: 70vh !important;
    object-fit: contain !important;
    border: none !important;
}

.lightbox .lb-container{
    max-width: 80vw !important;
    max-height: 70vh !important;
    padding: 0 !important;
}

/* Remove white background around image */
.lb-outerContainer{
    background: transparent !important;
}

/* Remove background behind caption area */
.lb-dataContainer{
    background: transparent !important;
}

/* Dark transparent overlay */
.lightboxOverlay{
    background: rgba(0,0,0,0.95) !important;
}

/* RESPONSIVE */

@media(max-width:991px){

    .box{
        column-count:2;
    }

    .heading h3{
        font-size:2.4rem;
    }
}

@media(max-width:600px){

    .box{
        column-count:1;
    }

    .heading h3{
        font-size:2rem;
    }

    .container{
        padding:30px 5%;
    }
}
    </style>
</head>

<script>

document.addEventListener("DOMContentLoaded", () => {

    const backBtn = document.querySelector(".back-btn");

    document.addEventListener("click", function(e){

        if(e.target.closest('[data-lightbox]')){
            setTimeout(() => {
                backBtn.style.display = "none";
            }, 100);
        }

        if(e.target.classList.contains("lb-close")){
            backBtn.style.display = "flex";
        }
    });

});
</script>
